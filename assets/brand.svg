<svg xmlns="http://www.w3.org/2000/svg" width="240" height="52" viewBox="0 0 240 52" role="img" aria-label="YieldVisor">
  <defs>
    <style>
      .brand {
        font-family: Georgia, "Libre Baskerville", "Times New Roman", serif;
        font-size: 36px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      .yield { fill: #1f2328; }
      .visor { fill: #00e676; }
      @media (prefers-color-scheme: dark) {
        .yield { fill: #e8eaf0; }
      }
    </style>
  </defs>
  <text class="brand" x="120" y="38" text-anchor="middle">
    <tspan class="yield">Yield</tspan><tspan class="visor">Visor</tspan>
  </text>
</svg>

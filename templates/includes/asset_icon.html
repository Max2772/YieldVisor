{% if logo_url %}
<div class="asset-icon asset-icon--logo"
     data-icon-text="{{ icon_text }}"
     data-icon-bg="{{ icon_bg }}"
     data-icon-fg="{{ icon_fg }}">
  <img src="{{ logo_url }}" alt="{{ ticker }}" class="asset-logo" width="32" height="32" loading="lazy"
       onerror="assetIconImageError(this)">
</div>
{% else %}
<div class="asset-icon asset-icon--letters" style="background:{{ icon_bg }};color:{{ icon_fg }}">{{ icon_text }}</div>
{% endif %}

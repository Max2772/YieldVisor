<div class="holding-actions-stack{% if hero_actions %} holding-actions-stack--hero{% endif %}">
  <button
    type="button"
    class="btn {% if not hero_actions %}btn-sm {% endif %}btn-outline holding-open-modal"
    data-modal="buy"
    data-ticker="{{ item.ticker|escape }}"
    data-asset-type="{{ item.asset_type|escape }}"
    data-asset-name="{{ item.asset_name|escape }}"
    data-app-id="{{ item.app_id_attr|escape }}"
    data-default-price="{{ item.suggested_sell_price|escape }}"
    data-next="{{ request.get_full_path|escape }}"
  >Buy</button>
  {% if item.position_id %}
  <button
    type="button"
    class="btn {% if not hero_actions %}btn-sm {% endif %}btn-ghost holding-open-modal"
    data-modal="sell"
    data-ticker="{{ item.ticker|escape }}"
    data-asset-type="{{ item.asset_type|escape }}"
    data-position-id="{{ item.position_id }}"
    data-qty-max="{{ item.qty_raw|escape }}"
    data-default-price="{{ item.suggested_sell_price|escape }}"
    data-next="{{ request.get_full_path|escape }}"
  >Sell</button>
  {% endif %}
</div>

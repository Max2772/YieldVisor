{% load static %}
<div
  id="holdingTradeOverlay"
  class="holding-overlay"
  hidden
  data-url-buy="{% url 'portfolio:buy_holding' %}"
  data-url-sell="{% url 'portfolio:sell_holding' %}"
  data-url-delete="{% url 'portfolio:delete_holding' %}"
>
  <div class="holding-overlay-backdrop" data-close-holding-modal tabindex="-1"></div>
  <div class="holding-overlay-panel" role="dialog" aria-modal="true" aria-labelledby="holdingModalTitle">
    <button type="button" class="holding-overlay-close" data-close-holding-modal aria-label="Close">&times;</button>
    <h3 id="holdingModalTitle" class="holding-modal-title"></h3>
    <div id="holdingModalErrors" class="holding-modal-errors" role="alert"></div>
    <form id="holdingModalForm" class="holding-modal-form" novalidate>
      {% csrf_token %}
      <input type="hidden" name="next" id="holdingModalNext" value="">
      <input type="hidden" name="position_id" id="holdingModalPositionId" value="">
      <input type="hidden" name="asset_type" id="holdingModalAssetType" value="">
      <input type="hidden" name="asset_name" id="holdingModalAssetName" value="">
      <input type="hidden" name="app_id" id="holdingModalAppId" value="">

      <div id="holdingModalFields" class="holding-modal-fields">
        <label class="holding-modal-label" for="holdingModalQuantity">Quantity</label>
        <input class="holding-modal-input" type="text" name="quantity" id="holdingModalQuantity" inputmode="decimal" autocomplete="off">

        <label class="holding-modal-label" for="holdingModalPrice" id="holdingModalPriceLabel">Price (USD)</label>
        <input class="holding-modal-input" type="text" id="holdingModalPrice" inputmode="decimal" autocomplete="off">
      </div>

      <p id="holdingModalDeleteHint" class="holding-modal-delete-hint" hidden>
        This removes the entire position from your portfolio (no sell record).
      </p>

      <div class="holding-modal-actions">
        <button type="button" class="btn btn-ghost" data-close-holding-modal>Cancel</button>
        <button type="submit" class="btn btn-primary" id="holdingModalSubmit">Submit</button>
      </div>
    </form>
  </div>
</div>

<script src="{% static 'js/holding_modal.js' %}"></script>

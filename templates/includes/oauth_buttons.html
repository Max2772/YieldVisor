{% load socialaccount %}
{% get_providers as oauth_providers %}

{% for provider in oauth_providers %}
  {% if provider.id == "google" %}
    <form method="post" action="{% provider_login_url 'google' next=next %}" class="btn-oauth-form">
      {% csrf_token %}
      <button type="submit" class="btn-oauth">
        <span class="btn-oauth-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
            <title>Google</title>
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </span>
        Google
      </button>
    </form>
  {% elif provider.id == "github" %}
    <form method="post" action="{% provider_login_url 'github' next=next %}" class="btn-oauth-form">
      {% csrf_token %}
      <button type="submit" class="btn-oauth">
        <span class="btn-oauth-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
            <title>GitHub</title>
            <path fill="currentColor" d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.4 7.86 10.93.58.11.79-.25.79-.56 0-.28-.01-1.02-.01-2-3.04.66-3.68-1.47-3.68-1.47-.5-1.26-1.22-1.6-1.22-1.6-.99-.68.08-.67.08-.67 1.09.08 1.67 1.12 1.67 1.12.97 1.66 2.55 1.18 3.17.9.1-.7.38-1.18.69-1.45-2.42-.28-4.97-1.21-4.97-5.4 0-1.19.43-2.17 1.12-2.93-.11-.28-.49-1.41.11-2.93 0 0 .92-.29 3.02 1.17.87-.24 1.81-.36 2.74-.36.93 0 1.87.12 2.74.36 2.1-1.46 3.02-1.17 3.02-1.17.6 1.52.22 2.65.11 2.93.7.76 1.12 1.74 1.12 2.93 0 4.2-2.55 5.11-4.97 5.39.39.34.73 1.01.73 2.04 0 1.47-.01 2.66-.01 3.02 0 .31.21.67.79.56A10.52 10.52 0 0023.5 12C23.5 5.65 18.35.5 12 .5z"/>
          </svg>
        </span>
        GitHub
      </button>
    </form>
  {% endif %}
{% endfor %}
